<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --accent:    #4f8ef7;
      --accent2:   #7b61ff;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --text:      #e8eaf6;
      --muted:     #7c83a8;
      --radius:    14px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 70%; height: 70%;
      background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(8%,6%); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideDown {
      from { opacity:0; transform:translateY(-24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      background: linear-gradient(135deg, #e8eaf6 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      animation: fadeIn 0.5s 0.1s both;
      transition: border-color 0.3s;
    }

    .card:hover { border-color: rgba(79,142,247,0.3); }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }

    input::placeholder { color: var(--muted); }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.3rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 16px rgba(79,142,247,0.3);
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,142,247,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      padding: 0.85rem 1.4rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 999;
      display: none;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    @keyframes toastIn {
      from { opacity:0; transform:translateY(16px) scale(0.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .toast-success { background:rgba(52,211,153,0.15); border:1px solid var(--green); color:var(--green); display:flex !important; animation:toastIn 0.35s ease; }
    .toast-error   { background:rgba(248,113,113,0.15); border:1px solid var(--red);   color:var(--red);   display:flex !important; animation:toastIn 0.35s ease; }
    .toast-info    { background:rgba(79,142,247,0.15);  border:1px solid var(--accent); color:var(--accent); display:flex !important; animation:toastIn 0.35s ease; }

    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem 0.7rem 2.5rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 0.8rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead { background: var(--surface2); }
    thead th {
      padding: 0.85rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid rgba(46,51,80,0.6);
      transition: background 0.15s;
      animation: rowIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rowIn {
      from { opacity:0; transform:translateX(-10px); }
      to   { opacity:1; transform:translateX(0); }
    }

    tbody tr:hover { background: rgba(79,142,247,0.05); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 0.85rem 1rem; vertical-align: middle; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; color: white; flex-shrink: 0;
    }

    .name-cell { display: flex; align-items: center; gap: 0.65rem; }

    .action-btn {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-edit { background:rgba(79,142,247,0.12); color:var(--accent); border-color:rgba(79,142,247,0.25); }
    .btn-edit:hover { background:rgba(79,142,247,0.22); }
    .btn-del  { background:rgba(248,113,113,0.1);  color:var(--red); border-color:rgba(248,113,113,0.25); }
    .btn-del:hover { background:rgba(248,113,113,0.2); }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty-state .icon { font-size:2.5rem; margin-bottom:0.5rem; }

    .stats-row { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 1.1rem;
      font-size: 0.85rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .stat-chip strong { color: var(--text); font-size: 1.1rem; }

    .editing-bar {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--yellow);
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .spinner {
      width:16px; height:16px;
      border:2px solid rgba(255,255,255,0.3);
      border-top-color:white;
      border-radius:50%;
      animation:spin 0.7s linear infinite;
      display:inline-block;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="wrapper">

  <header>
    <h1>📇 Contacts Manager</h1>
    <p>Add, edit and delete your contacts — all saved to the cloud</p>
  </header>

  <!-- Add / Edit Form -->
  <div class="card">
    <div class="card-title">
      <span class="dot"></span>
      <span id="form-title">Add New Contact</span>
    </div>

    <div class="editing-bar" id="editing-bar">
      ✏️ Editing: <strong id="editing-name"></strong>
      <button class="btn-ghost" id="btn-cancel-edit" style="margin-left:auto;padding:0.3rem 0.8rem;font-size:0.8rem;">Cancel</button>
    </div>

    <div class="form-grid">
      <div>
        <label for="inp-name">Full Name *</label>
        <input type="text" id="inp-name" placeholder="e.g. Sarah Tan" />
      </div>
      <div>
        <label for="inp-company">Company</label>
        <input type="text" id="inp-company" placeholder="e.g. Acme Pte Ltd" />
      </div>
      <div>
        <label for="inp-email">Email</label>
        <input type="email" id="inp-email" placeholder="sarah@example.com" />
      </div>
      <div>
        <label for="inp-phone">Phone</label>
        <input type="text" id="inp-phone" placeholder="+65 9123 4567" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-save">＋ Add Contact</button>
      <button class="btn-ghost"   id="btn-clear">Clear</button>
    </div>
  </div>

  <!-- Contacts Table -->
  <div class="card">
    <div class="card-title">
      <span class="dot" style="background:var(--green);box-shadow:0 0 8px var(--green)"></span>
      All Contacts
      <button class="btn-ghost" id="btn-refresh" style="margin-left:auto;padding:0.35rem 0.8rem;font-size:0.8rem;">↻ Refresh</button>
    </div>

    <div class="stats-row">
      <div class="stat-chip">👥 Total: <strong id="stat-total">—</strong></div>
      <div class="stat-chip">🕐 Last loaded: <strong id="stat-loaded">—</strong></div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-inp" placeholder="Search by name, email or company…" />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Company</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="contacts-tbody">
          <tr><td colspan="5">
            <div class="empty-state">
              <div class="icon">⏳</div>
              Connecting to database…
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
  // ── Credentials are hardcoded — no login panel needed ─────────────────────
  const SUPABASE_URL = 'https://utonakdztilagefebtal.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0b25ha2R6dGlsYWdlZmVidGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjM5MDYsImV4cCI6MjA4ODMzOTkwNn0.NSUOY6aE4SmOk3RawwOCfnI4PIO2lZRaJTbh787cG-4'

  // ── State ──────────────────────────────────────────────────────────────────
  let sb          = null
  let allContacts = []
  let editingId   = null

  // ── Button listeners ───────────────────────────────────────────────────────
  document.getElementById('btn-save').addEventListener('click', saveContact)
  document.getElementById('btn-clear').addEventListener('click', cancelEdit)
  document.getElementById('btn-cancel-edit').addEventListener('click', cancelEdit)
  document.getElementById('btn-refresh').addEventListener('click', loadContacts)
  document.getElementById('search-inp').addEventListener('input', filterTable)

  // ── Connect and load on page open ─────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    loadContacts()
  })

  // ── Load all contacts ──────────────────────────────────────────────────────
  async function loadContacts() {
    setTableLoading(true)
    const { data, error } = await sb
      .from('contacts')
      .select('*')
      .order('created_at', { ascending: false })

    if (error) {
      showToast('Load failed: ' + error.message, 'error')
      setTableLoading(false)
      return
    }

    allContacts = data || []
    renderTable(allContacts)
    document.getElementById('stat-total').textContent  = allContacts.length
    document.getElementById('stat-loaded').textContent = new Date().toLocaleTimeString()
  }

  // ── Insert or Update ───────────────────────────────────────────────────────
  async function saveContact() {
    const name    = document.getElementById('inp-name').value.trim()
    const email   = document.getElementById('inp-email').value.trim()
    const phone   = document.getElementById('inp-phone').value.trim()
    const company = document.getElementById('inp-company').value.trim()

    if (!name) { showToast('Name is required', 'error'); return }

    const payload = { name, email: email||null, phone: phone||null, company: company||null }

    const btn = document.getElementById('btn-save')
    btn.disabled  = true
    btn.innerHTML = '<span class="spinner"></span> Saving…'

    if (editingId) {
      const { error } = await sb.from('contacts').update(payload).eq('id', editingId)
      if (error) { showToast('Update failed: ' + error.message, 'error'); resetSaveBtn(); return }
      showToast('Contact updated ✓', 'success')
    } else {
      const { error } = await sb.from('contacts').insert([payload])
      if (error) { showToast('Insert failed: ' + error.message, 'error'); resetSaveBtn(); return }
      showToast('Contact added ✓', 'success')
    }

    cancelEdit()
    loadContacts()
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  async function deleteContact(id, name) {
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) return
    const { error } = await sb.from('contacts').delete().eq('id', id)
    if (error) { showToast('Delete failed: ' + error.message, 'error'); return }
    showToast('Contact deleted', 'info')
    loadContacts()
  }

  // ── Start editing a row ────────────────────────────────────────────────────
  function startEdit(id, name, email, phone, company) {
    editingId = id
    document.getElementById('inp-name').value    = name    || ''
    document.getElementById('inp-email').value   = email   || ''
    document.getElementById('inp-phone').value   = phone   || ''
    document.getElementById('inp-company').value = company || ''
    document.getElementById('form-title').textContent    = 'Edit Contact'
    document.getElementById('editing-name').textContent  = name
    document.getElementById('editing-bar').style.display = 'flex'
    document.getElementById('btn-save').innerHTML        = '✓ Save Changes'
    document.querySelector('.card').scrollIntoView({ behavior: 'smooth' })
    document.getElementById('inp-name').focus()
  }

  // ── Cancel / clear form ────────────────────────────────────────────────────
  function cancelEdit() {
    editingId = null
    document.getElementById('inp-name').value    = ''
    document.getElementById('inp-email').value   = ''
    document.getElementById('inp-phone').value   = ''
    document.getElementById('inp-company').value = ''
    document.getElementById('form-title').textContent    = 'Add New Contact'
    document.getElementById('editing-bar').style.display = 'none'
    resetSaveBtn()
  }

  function resetSaveBtn() {
    const btn     = document.getElementById('btn-save')
    btn.disabled  = false
    btn.innerHTML = editingId ? '✓ Save Changes' : '＋ Add Contact'
  }

  // ── Render table rows ──────────────────────────────────────────────────────
  function renderTable(contacts) {
    const tbody = document.getElementById('contacts-tbody')

    if (contacts.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5">
        <div class="empty-state">
          <div class="icon">📭</div>
          No contacts yet — add your first one above!
        </div></td></tr>`
      return
    }

    tbody.innerHTML = contacts.map((c, i) => {
      const ini  = (c.name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)
      const safe = s => (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
      return `
        <tr style="animation-delay:${i*0.04}s">
          <td><div class="name-cell">
            <div class="avatar">${ini}</div>
            <span>${esc(c.name)}</span>
          </div></td>
          <td>${c.email   ? esc(c.email)   : '<span style="color:var(--muted)">—</span>'}</td>
          <td>${c.phone   ? esc(c.phone)   : '<span style="color:var(--muted)">—</span>'}</td>
          <td>${c.company ? esc(c.company) : '<span style="color:var(--muted)">—</span>'}</td>
          <td><div style="display:flex;gap:0.4rem">
            <button class="action-btn btn-edit"
              data-id="${c.id}" data-name="${safe(c.name)}"
              data-email="${safe(c.email)}" data-phone="${safe(c.phone)}"
              data-company="${safe(c.company)}">✏️ Edit</button>
            <button class="action-btn btn-del"
              data-id="${c.id}" data-name="${safe(c.name)}">🗑 Delete</button>
          </div></td>
        </tr>`
    }).join('')

    tbody.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', () =>
        startEdit(btn.dataset.id, btn.dataset.name, btn.dataset.email, btn.dataset.phone, btn.dataset.company))
    })
    tbody.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', () => deleteContact(btn.dataset.id, btn.dataset.name))
    })
  }

  // ── Live search filter ─────────────────────────────────────────────────────
  function filterTable() {
    const q = document.getElementById('search-inp').value.toLowerCase()
    renderTable(allContacts.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.email||'').toLowerCase().includes(q) ||
      (c.company||'').toLowerCase().includes(q)
    ))
  }

  // ── Utility helpers ────────────────────────────────────────────────────────
  function setTableLoading(on) {
    if (!on) return
    document.getElementById('contacts-tbody').innerHTML =
      `<tr><td colspan="5" style="text-align:center;padding:2.5rem;color:var(--muted)">
        <span class="spinner" style="border-top-color:var(--accent)"></span>&nbsp; Loading…
      </td></tr>`
  }

  function esc(str) {
    const d = document.createElement('div')
    d.textContent = str || ''
    return d.innerHTML
  }

  let toastTimer = null
  function showToast(msg, type) {
    const t = document.getElementById('toast')
    t.textContent = ({ success:'✅ ', error:'❌ ', info:'ℹ️ ' }[type]||'') + msg
    t.className   = 'toast-' + type
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => { t.style.display = 'none' }, 3500)
  }
</script>
</body>
</html>
